# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - financialflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . -x ".git/*" ".github/*" "**/.cache/*"
          echo "=== release.zip size ==="
          ls -lh release.zip
          echo "=== node_modules/next entries in zip ==="
          unzip -l release.zip | grep "node_modules/next/" | head -20
          echo "=== total node_modules entry count ==="
          unzip -l release.zip | grep "node_modules/" | wc -l

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'financialflow'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_28B190D8E22040F3926FFB21D9BA5E2C }}

      - name: Verify deployment
        run: |
          echo "Waiting 30s for app restart..."
          sleep 30
          echo "Health check:"
          curl -is https://financialflow-bbhybzh3fvgaejgs.westus3-01.azurewebsites.net/api/health | head -20