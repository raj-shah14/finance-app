name: Account sync (6x daily)

# Triggers /api/cron/sync on the deployed Azure app 6 times per day
# so Plaid + SnapTrade balances and transactions stay reasonably fresh.
#
# Requires two repository secrets to be configured under Settings →
# Secrets and variables → Actions → Repository secrets:
#   - APP_URL      e.g. https://thefinancialflows.net
#   - CRON_SECRET  the same value set as CRON_SECRET in Azure env

on:
  schedule:
    # Every 4 hours at minute 5: 00:05, 04:05, 08:05, 12:05, 16:05, 20:05 UTC
    - cron: "5 */4 * * *"
  # Allow manual triggering from the Actions tab for ad-hoc runs.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL or CRON_SECRET secret is missing"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/sync")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron sync returned $status"
            exit 1
          fi
